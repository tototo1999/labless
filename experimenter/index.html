<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>labless · 实验台</title>
<style>
  :root{
    --page:#0a0b0d; --screen:#181a1d; --tabbar:#121316; --tabact:#1f2226;
    --line:#2a2d33; --ink:#d6dae1; --dim:#6b7079; --faint:#444851;
    --stripe:#2f81f7; --blue:#8ab4f8; --code:#9cc0ff; --green:#5bd47c;
    --pink:#ff7196; --purple:#c899e8;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; background:var(--page); }
  body{ font:13px/1.58 ui-monospace,"SF Mono",Menlo,"JetBrains Mono",Consolas,"PingFang SC",monospace;
        color:var(--ink); padding:22px 16px 50px; }
  /* ── 页头 ── */
  header{ max-width:1300px; margin:0 auto 20px; display:flex; align-items:baseline; gap:14px; flex-wrap:wrap; }
  header .wm{ font-size:22px; font-weight:700; letter-spacing:.5px; color:#fff; }
  header .wm b{ color:var(--stripe); }
  header .sub{ color:var(--dim); font-size:13px; }
  header .meta{ margin-left:auto; color:var(--dim); font-size:12px; display:flex; align-items:center; gap:7px; }
  header .meta i{ width:8px;height:8px;border-radius:50%;background:var(--green); animation:blink 1.2s infinite; }
  /* ── 终端墙 ── */
  .floor{ max-width:1300px; margin:0 auto; display:grid;
          grid-template-columns:repeat(auto-fill, minmax(400px,1fr)); gap:18px; }
  .win{ background:var(--screen); border:1px solid var(--line); border-left:3px solid var(--stripe);
        border-radius:7px; overflow:hidden; display:flex; flex-direction:column;
        box-shadow:0 18px 50px -24px #000; }
  .tabs{ display:flex; align-items:stretch; background:var(--tabbar); border-bottom:1px solid var(--line); height:34px; }
  .tab{ display:flex; align-items:center; gap:7px; padding:0 11px; font-size:12px; color:var(--ink);
        background:var(--tabact); border-top:2px solid var(--stripe); border-right:1px solid var(--line); }
  .tab .ic{ color:var(--dim); display:flex; } .tab .ic svg{ width:12px; height:12px; }
  .tab .x{ color:var(--faint); margin-left:3px; }
  .grow{ flex:1; }
  .tools{ display:flex; align-items:center; gap:13px; padding:0 12px; color:var(--dim); }
  .tools svg{ width:15px; height:15px; display:block; }
  .screen{ padding:11px 14px 6px; height:430px; overflow-y:auto; }
  .screen::-webkit-scrollbar{ width:7px; } .screen::-webkit-scrollbar-thumb{ background:#2c3036; border-radius:4px; }
  .ln{ white-space:pre-wrap; word-break:break-word; animation:fade .2s ease; }
  @keyframes fade{ from{ opacity:0; } }
  .b{ color:#e8ebf0; } .atext{ color:var(--ink); } .br{ color:var(--faint); }
  .dim{ color:var(--dim); } .code{ color:var(--code); } .tool{ color:#e8ebf0; }
  .prop b{ color:#fff; } .star{ color:var(--dim); }
  .prompt{ margin-top:9px; } .prompt .p{ color:var(--ink); }
  .cur{ background:var(--ink); color:var(--screen); animation:blink 1.05s step-end infinite; }
  @keyframes blink{ 50%{ background:transparent; } }
  .status{ border-top:1px solid var(--line); background:var(--tabbar); padding:5px 11px 6px; font-size:10.5px; }
  .sl{ display:flex; align-items:center; white-space:nowrap; overflow:hidden; }
  .sl .seg{ color:var(--dim); } .sl .seg.m{ color:var(--ink); }
  .sl .pipe{ color:var(--faint); margin:0 7px; }
  .sl .bar{ color:var(--green); letter-spacing:1px; } .sl .pct{ color:var(--dim); margin-left:5px; }
  .sl .gap{ margin-left:9px; }
  .sl2{ margin-top:3px; } .sl2 .warn{ color:var(--pink); } .sl2 .remote{ color:var(--green); margin-left:auto; }
</style>
</head>
<body>
<header>
  <span class="wm">lab<b>l</b>ess</span>
  <span class="sub">实验台 · 实验员无人值守跑命题,各家模型同台,机器判分,出共识</span>
  <span class="meta"><i></i><span id="online">0</span> 个实验员在跑</span>
</header>
<div class="floor" id="floor"></div>
<script>
const ICON_TERM='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>';
const ICON_TOOLS=[
 '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="16" rx="2"/><polyline points="7 9 10 12 7 15" stroke-linecap="round" stroke-linejoin="round"/><line x1="13" y1="15" x2="17" y2="15" stroke-linecap="round"/></svg>',
 '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/></svg>',
 '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="12" y1="4" x2="12" y2="20"/></svg>',
 '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="3" y1="12" x2="21" y2="12"/></svg>'].join('');

function card(tab){ return `
  <div class="tabs"><div class="tab"><span class="ic">${ICON_TERM}</span> ${tab} <span class="x">✕</span></div>
    <div class="grow"></div><div class="tools">${ICON_TOOLS}</div></div>
  <div class="screen"><div class="prompt"><span class="p">❯</span> <span class="cur">&nbsp;</span></div></div>
  <div class="status">
    <div class="sl"><span class="seg m">[claude-haiku-4.5]</span>
      <span class="gap seg prog">命题 0/0</span><span class="gap seg cost">$0.0000</span>
      <span class="pipe">|</span><span class="bar">░░░░░░░░░░</span><span class="pct">0%</span></div>
    <div class="sl sl2"><span class="warn">▶▶ bypass permissions on (shift+tab to cycle)</span>
      <span class="remote">Remote Control active</span></div>
  </div>`; }

const esc=s=>(s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
const ts=t=>{const d=new Date((t||0)*1000),p=n=>String(n).padStart(2,'0');
  return `<span class="dim">[${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}]</span> `;};
const pctOf=(a,n)=>n?Math.round(a/n*100):0;

let onlineCount=0;
function makeTerminal(win, streamUrl){
  const feed=win.querySelector('.screen'), $=s=>win.querySelector(s);
  let cleared=false, cost=0, total=0;
  const bar=$('.bar'), pct=$('.pct'), prog=$('.prog'), costEl=$('.cost');
  function setBar(f){ f=Math.max(0,Math.min(1,f)); const k=Math.round(f*10);
    bar.textContent='█'.repeat(k)+'░'.repeat(10-k); pct.textContent=Math.round(f*100)+'%'; }
  function ln(cls,html){ const d=document.createElement('div'); d.className='ln '+cls; d.innerHTML=html; return d; }
  function dropCur(){ const c=feed.querySelector('.curline'); if(c) c.remove(); }
  function addCur(){ dropCur(); const c=ln('prompt curline',`<span class="p">❯</span> <span class="cur">&nbsp;</span>`); feed.appendChild(c); }
  function render(e){
    if(!cleared){ feed.innerHTML=''; cleared=true; }
    dropCur();
    if(e.kind==='start'){ total=e.n_props||0; prog.textContent='命题 0/'+total;
      feed.appendChild(ln('star',`* labless consensus-lab · 受试 [${(e.subjects||[]).join(', ')}] · 无人值守 session`));
    } else if(e.kind==='say'){ feed.appendChild(ln('','<span class="b">●</span> <span class="atext">'+esc(e.text)+'</span>'));
    } else if(e.kind==='proposition'){ prog.textContent='命题 '+e.idx+'/'+e.total;
      feed.appendChild(ln('prop','\n<span class="b">●</span> 命题 '+e.idx+'/'+e.total+' · <b>'+esc(e.title)+'</b>'));
      feed.appendChild(ln('','  <span class="dim"># '+esc(e.blurb)+'</span>'));
    } else if(e.kind==='running'){ feed.appendChild(ln('',ts(e.t)+'<span class="b">●</span> <span class="tool">Run</span>(<span class="code">lab eval "'+esc(e.title)+'" --model='+esc(e.model).toLowerCase()+'</span>)'));
    } else if(e.kind==='result'){ cost+=e.cost||0; costEl.textContent='$'+cost.toFixed(4);
      feed.appendChild(ln('','  <span class="br">⎿</span>  '+esc(e.model)+'  '+e.ok+'/'+e.n+'  <span class="dim">'+pctOf(e.ok,e.n)+'%  $'+(e.cost||0).toFixed(4)+'</span>'));
    } else if(e.kind==='consensus'){ const sc=(e.scores||[]).map(s=>s[0]+' '+s[1]+'/'+s[2]).join('  ·  ');
      feed.appendChild(ln('','<span class="b">●</span> <span class="atext">共识：'+esc(e.text)+'</span>'));
      feed.appendChild(ln('','  <span class="br">⎿</span> <span class="dim">'+sc+'</span>')); if(total) setBar(e.idx/total);
    } else if(e.kind==='done'){ if(e.total_cost!=null) costEl.textContent='$'+Number(e.total_cost).toFixed(4); setBar(1);
      feed.appendChild(ln('star','\n* session complete · '+(e.total_cost!=null?'$'+Number(e.total_cost).toFixed(4):'')+' · 共识已落墙'));
    }
    addCur(); feed.scrollTop=feed.scrollHeight;
  }
  function reset(){ feed.innerHTML=''; cleared=false; cost=0; total=0; costEl.textContent='$0.0000'; prog.textContent='命题 0/0'; setBar(0); }
  (async function(){
    let ev=[];
    try{ const r=await fetch(streamUrl+'?_='+Date.now(),{cache:'no-store'});
      ev=(await r.text()).split('\n').filter(Boolean).map(l=>{try{return JSON.parse(l)}catch(_){return null}}).filter(Boolean);
    }catch(_){ return; }
    if(!ev.length) return;
    onlineCount++; document.getElementById('online').textContent=onlineCount;
    while(true){ reset();
      for(let i=0;i<ev.length;i++){ render(ev[i]);
        const nx=ev[i+1]; let d=550; if(nx){ d=Math.max(260,Math.min(1700,(nx.t-ev[i].t)*1000)); }
        await sleep(d); }
      await sleep(4200);
    }
  })();
}

// 三个实验员窗口,各跑各的(独立 session 流)
const SESSIONS=[
  {tab:'labless', stream:'./session-1.jsonl'},
  {tab:'labless', stream:'./session-2.jsonl'},
  {tab:'labless', stream:'./session-3.jsonl'},
];
const floor=document.getElementById('floor');
for(const s of SESSIONS){ const win=document.createElement('div'); win.className='win'; win.innerHTML=card(s.tab); floor.appendChild(win); makeTerminal(win, s.stream); }
</script>
</body>
</html>
