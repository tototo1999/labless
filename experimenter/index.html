<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>labless · 实验台</title>
<style>
  :root{
    --page:#0a0b0d; --titlebar:#2a2c30; --screen:#161719; --line:#26282c;
    --ink:#d6dae1; --dim:#6b7079; --faint:#444851;
    --blue:#8ab4f8; --code:#9cc0ff; --green:#5bd47c; --pink:#ff7196;
    --gold:#f4c542;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; background:var(--page); }
  body{ font:11px/1.5 "SF Mono",ui-monospace,Menlo,"JetBrains Mono",Consolas,"PingFang SC",monospace;
        color:var(--ink); padding:18px 14px 40px; }
  header{ max-width:1200px; margin:0 auto 16px; display:flex; align-items:baseline; gap:12px; flex-wrap:wrap; }
  header .wm{ font-size:18px; font-weight:700; letter-spacing:.5px; color:#fff; }
  header .sub{ color:var(--dim); font-size:12px; }
  header .meta{ margin-left:auto; color:var(--dim); font-size:11px; display:flex; align-items:center; gap:6px; }
  header .meta i{ width:7px;height:7px;border-radius:50%;background:var(--green); animation:blink 1.2s infinite; }
  @keyframes blink{ 50%{ opacity:.35; } }

  .floor{ max-width:1200px; margin:0 auto; display:grid;
          grid-template-columns:repeat(auto-fill, minmax(330px,1fr)); gap:16px; }

  /* ── 台签:这台是谁的,在跑什么,被试是谁 ── */
  .bench{ display:flex; flex-direction:column; gap:7px; }
  .plate{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; padding:0 2px; }
  .plate .who{ color:var(--gold); font-weight:700; font-size:12px; }
  .plate .role{ color:var(--dim); font-size:11px; }
  .plate .sep{ color:var(--faint); }
  .plate .subj{ margin-left:auto; display:flex; align-items:center; gap:6px; }
  .plate .subj span{ color:var(--dim); font-size:10px; }
  .plate .subj img{ width:20px; height:20px; border-radius:50%; object-fit:cover; object-position:top;
                    border:1px solid var(--line); display:block; }

  /* ── 终端窗:一比一 macOS 风(交通灯+居中标题) ── */
  .win{ background:var(--screen); border:1px solid var(--line); border-radius:8px; overflow:hidden;
        box-shadow:0 14px 40px -20px #000; }
  .tbar{ position:relative; height:26px; background:var(--titlebar); border-bottom:1px solid #1d1f22;
         display:flex; align-items:center; }
  .dots{ position:absolute; left:9px; display:flex; gap:6px; }
  .dots i{ width:11px; height:11px; border-radius:50%; display:block; }
  .dots i:nth-child(1){ background:#ff5f57; } .dots i:nth-child(2){ background:#febc2e; }
  .dots i:nth-child(3){ background:#28c840; }
  .ttitle{ flex:1; text-align:center; font-size:10.5px; color:#9a9ea6; padding:0 60px;
           white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .screen{ padding:8px 10px 4px; height:280px; overflow-y:auto; font-size:11px; line-height:1.5; }
  .screen::-webkit-scrollbar{ width:6px; } .screen::-webkit-scrollbar-thumb{ background:#2c3036; border-radius:3px; }
  .ln{ white-space:pre-wrap; word-break:break-word; animation:fade .2s ease; }
  @keyframes fade{ from{ opacity:0; } }
  .b{ color:#e8ebf0; } .atext{ color:var(--ink); } .br{ color:var(--faint); }
  .dim{ color:var(--dim); } .code{ color:var(--code); } .tool{ color:#e8ebf0; }
  .prop b{ color:#fff; } .star{ color:var(--dim); }
  .prompt{ margin-top:7px; } .prompt .p{ color:var(--ink); }
  .cur{ background:var(--ink); color:var(--screen); animation:cblink 1.05s step-end infinite; }
  @keyframes cblink{ 50%{ background:transparent; } }
  .status{ border-top:1px solid var(--line); background:#121316; padding:4px 9px 5px; font-size:9.5px; }
  .sl{ display:flex; align-items:center; white-space:nowrap; overflow:hidden; }
  .sl .seg{ color:var(--dim); } .sl .seg.m{ color:var(--ink); }
  .sl .pipe{ color:var(--faint); margin:0 6px; }
  .sl .bar{ color:var(--green); letter-spacing:1px; } .sl .pct{ color:var(--dim); margin-left:4px; }
  .sl .gap{ margin-left:8px; }
  @media (prefers-reduced-motion: reduce){ *{ animation:none!important; } }
</style>
</head>
<body>
<header>
  <span class="wm">labless · 实验台</span>
  <span class="sub">一台一签:谁的台子 · 在跑哪道命题 · 被试是谁——屏里就是这道题的直播回放</span>
  <span class="meta"><i></i><span id="online">0</span> 个实验员在跑</span>
</header>
<div class="floor" id="floor"></div>
<script>
function card(s){
  const subj = s.subj.map(x => x[0]
    ? `<img src="${x[0]}" alt="${x[1]}" title="${x[1]}"><span>${x[1]}</span>`
    : `<span>${x[1]}</span>`).join('');
  return `
  <div class="plate"><span class="who">⬤ ${s.who}</span><span class="role">${s.role}</span>
    <span class="subj"><span style="color:var(--faint)">被试</span>${subj}</span></div>
  <div class="win">
    <div class="tbar"><div class="dots"><i></i><i></i><i></i></div>
      <div class="ttitle">${s.user}@labless — ${s.props} — 80×24</div></div>
    <div class="screen"><div class="prompt"><span class="p">❯</span> <span class="cur">&nbsp;</span></div></div>
    <div class="status">
      <div class="sl"><span class="seg m">[claude-haiku-4.5]</span>
        <span class="gap seg prog">命题 0/0</span><span class="gap seg cost">$0.0000</span>
        <span class="pipe">|</span><span class="bar">░░░░░░░░░░</span><span class="pct">0%</span></div>
    </div>
  </div>`;
}

const esc=s=>(s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
const ts=t=>{const d=new Date((t||0)*1000),p=n=>String(n).padStart(2,'0');
  return `<span class="dim">[${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}]</span> `;};
const pctOf=(a,n)=>n?Math.round(a/n*100):0;

let onlineCount=0;
function makeTerminal(bench, streamUrl){
  const win=bench.querySelector('.win');
  const feed=win.querySelector('.screen'), $=s=>win.querySelector(s);
  let cleared=false, cost=0, total=0;
  const bar=$('.bar'), pct=$('.pct'), prog=$('.prog'), costEl=$('.cost');
  function setBar(f){ f=Math.max(0,Math.min(1,f)); const k=Math.round(f*10);
    bar.textContent='█'.repeat(k)+'░'.repeat(10-k); pct.textContent=Math.round(f*100)+'%'; }
  function ln(cls,html){ const d=document.createElement('div'); d.className='ln '+cls; d.innerHTML=html; return d; }
  function dropCur(){ const c=feed.querySelector('.curline'); if(c) c.remove(); }
  function addCur(){ dropCur(); const c=ln('prompt curline',`<span class="p">❯</span> <span class="cur">&nbsp;</span>`); feed.appendChild(c); }
  function render(e){
    if(!cleared){ feed.innerHTML=''; cleared=true; }
    dropCur();
    if(e.kind==='start'){ total=e.n_props||0; prog.textContent='命题 0/'+total;
      feed.appendChild(ln('star',`* labless consensus-lab · 受试 [${(e.subjects||[]).join(', ')}] · 无人值守 session`));
    } else if(e.kind==='say'){ feed.appendChild(ln('','<span class="b">●</span> <span class="atext">'+esc(e.text)+'</span>'));
    } else if(e.kind==='proposition'){ prog.textContent='命题 '+e.idx+'/'+e.total;
      feed.appendChild(ln('prop','\n<span class="b">●</span> 命题 '+e.idx+'/'+e.total+' · <b>'+esc(e.title)+'</b>'));
      feed.appendChild(ln('','  <span class="dim"># '+esc(e.blurb)+'</span>'));
    } else if(e.kind==='running'){ feed.appendChild(ln('',ts(e.t)+'<span class="b">●</span> <span class="tool">Run</span>(<span class="code">lab eval "'+esc(e.title)+'" --model='+esc(e.model).toLowerCase()+'</span>)'));
    } else if(e.kind==='result'){ cost+=e.cost||0; costEl.textContent='$'+cost.toFixed(4);
      feed.appendChild(ln('','  <span class="br">⎿</span>  '+esc(e.model)+'  '+e.ok+'/'+e.n+'  <span class="dim">'+pctOf(e.ok,e.n)+'%  $'+(e.cost||0).toFixed(4)+'</span>'));
    } else if(e.kind==='consensus'){ const sc=(e.scores||[]).map(s=>s[0]+' '+s[1]+'/'+s[2]).join('  ·  ');
      feed.appendChild(ln('','<span class="b">●</span> <span class="atext">共识：'+esc(e.text)+'</span>'));
      feed.appendChild(ln('','  <span class="br">⎿</span> <span class="dim">'+sc+'</span>')); if(total) setBar(e.idx/total);
    } else if(e.kind==='done'){ if(e.total_cost!=null) costEl.textContent='$'+Number(e.total_cost).toFixed(4); setBar(1);
      feed.appendChild(ln('star','\n* session complete · '+(e.total_cost!=null?'$'+Number(e.total_cost).toFixed(4):'')+' · 共识已落墙'));
    }
    addCur(); feed.scrollTop=feed.scrollHeight;
  }
  function reset(){ feed.innerHTML=''; cleared=false; cost=0; total=0; costEl.textContent='$0.0000'; prog.textContent='命题 0/0'; setBar(0); }
  (async function(){
    let ev=[];
    try{ const r=await fetch(streamUrl+'?_='+Date.now(),{cache:'no-store'});
      ev=(await r.text()).split('\n').filter(Boolean).map(l=>{try{return JSON.parse(l)}catch(_){return null}}).filter(Boolean);
    }catch(_){ return; }
    if(!ev.length) return;
    onlineCount++; document.getElementById('online').textContent=onlineCount;
    while(true){ reset();
      for(let i=0;i<ev.length;i++){ render(ev[i]);
        const nx=ev[i+1]; let d=550; if(nx){ d=Math.max(260,Math.min(1700,(nx.t-ev[i].t)*1000)); }
        await sleep(d); }
      await sleep(4200);
    }
  })();
}

// 三台:台签(实验员·名册真身)+ 被试(人物谱)+ 该台命题流 —— 一台一签一屏,闭环
const M1='../img/cast/m1.jpg', M2='../img/cast/m2.jpg';
const SESSIONS=[
  {who:'法拉第', role:'对照实验员 · 主力', user:'faraday', props:'OG-003 · OG-002 · OG-008',
   subj:[[M1,'夏洛·Claude'],[M2,'米拉·Gemini'],[null,'Codex']], stream:'./session-1.jsonl'},
  {who:'小号', role:'复验员 · 保险丝', user:'fuse', props:'OG-003 · OG-002 · OG-008(复验)',
   subj:[[M1,'夏洛·Claude'],[M2,'米拉·Gemini']], stream:'./session-2.jsonl'},
  {who:'Codex', role:'独立复验位 · 跨 harness', user:'codex', props:'OG-008 · OG-004 · OG-003',
   subj:[[M1,'夏洛·Claude'],[M2,'米拉·Gemini']], stream:'./session-3.jsonl'},
];
const floor=document.getElementById('floor');
for(const s of SESSIONS){ const b=document.createElement('div'); b.className='bench'; b.innerHTML=card(s); floor.appendChild(b); makeTerminal(b, s.stream); }
</script>
</body>
</html>
