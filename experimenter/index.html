<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>实验员 · labless</title>
<style>
  :root{
    --page:#0c0d0f; --screen:#181a1d; --tabbar:#121316; --tabact:#1f2226;
    --line:#2a2d33; --ink:#d6dae1; --dim:#6b7079; --faint:#444851;
    --stripe:#2f81f7; --blue:#8ab4f8; --code:#9cc0ff; --green:#5bd47c;
    --pink:#ff7196; --purple:#c899e8;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; background:var(--page); }
  body{ font:13.5px/1.6 ui-monospace,"SF Mono",Menlo,"JetBrains Mono",Consolas,"PingFang SC",monospace;
        color:var(--ink); display:flex; justify-content:center; padding:14px 10px; }
  .win{ width:100%; max-width:460px; background:var(--screen); border:1px solid var(--line);
        border-left:3px solid var(--stripe); border-radius:7px; overflow:hidden; display:flex;
        flex-direction:column; box-shadow:0 26px 70px -22px #000; }
  /* ── tab bar ── */
  .tabs{ display:flex; align-items:stretch; background:var(--tabbar); border-bottom:1px solid var(--line); height:36px; }
  .tab{ display:flex; align-items:center; gap:7px; padding:0 12px; font-size:12.5px; color:var(--ink);
        background:var(--tabact); border-top:2px solid var(--stripe); border-right:1px solid var(--line); }
  .tab .ic{ color:var(--dim); display:flex; } .tab .ic svg{ width:13px; height:13px; }
  .tab .x{ color:var(--faint); margin-left:3px; font-size:13px; }
  .grow{ flex:1; }
  .tools{ display:flex; align-items:center; gap:15px; padding:0 14px; color:var(--dim); }
  .tools svg{ width:16px; height:16px; display:block; }
  /* ── screen ── */
  .screen{ padding:12px 15px 6px; min-height:60vh; }
  .ln{ white-space:pre-wrap; word-break:break-word; animation:fade .2s ease; }
  @keyframes fade{ from{ opacity:0; } }
  .b{ color:#e8ebf0; }                 /* ● bullet */
  .atext{ color:var(--ink); }
  .br{ color:var(--faint); }           /* ⎿ branch */
  .dim{ color:var(--dim); } .code{ color:var(--code); } .blue{ color:var(--blue); }
  .tool{ color:#e8ebf0; }
  .prop{ color:#e8ebf0; } .prop b{ color:#fff; }
  .star{ color:var(--dim); }           /* * meta line */
  .prompt{ margin-top:10px; } .prompt .p{ color:var(--ink); }
  .cur{ background:var(--ink); color:var(--screen); animation:blink 1.05s step-end infinite; }
  @keyframes blink{ 50%{ background:transparent; } }
  /* ── status bar (Claude Code 风,2 行) ── */
  .status{ border-top:1px solid var(--line); background:var(--tabbar); padding:6px 12px 7px; font-size:11px; }
  .sl{ display:flex; align-items:center; gap:0; white-space:nowrap; overflow:hidden; }
  .sl .seg{ color:var(--dim); } .sl .seg.m{ color:var(--ink); } .sl .seg.c{ color:var(--ink); }
  .sl .pipe{ color:var(--faint); margin:0 8px; }
  .sl .bar{ color:var(--green); letter-spacing:1px; } .sl .pct{ color:var(--dim); margin-left:6px; }
  .sl .gap{ margin-left:10px; }
  .sl2{ margin-top:3px; } .sl2 .warn{ color:var(--pink); } .sl2 .remote{ color:var(--green); margin-left:auto; }
</style>
</head>
<body>
<div class="win">
  <div class="tabs">
    <div class="tab">
      <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg></span>
      labless <span class="x">✕</span>
    </div>
    <div class="grow"></div>
    <div class="tools">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="16" rx="2"/><polyline points="7 9 10 12 7 15" stroke-linecap="round" stroke-linejoin="round"/><line x1="13" y1="15" x2="17" y2="15" stroke-linecap="round"/></svg>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/></svg>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="3" y1="12" x2="21" y2="12"/></svg>
    </div>
  </div>
  <div class="screen" id="feed"><div class="prompt"><span class="p">❯</span> <span class="cur">&nbsp;</span></div></div>
  <div class="status">
    <div class="sl">
      <span class="seg m">[claude-haiku-4.5]</span>
      <span class="gap seg" id="prog">命题 0/0</span>
      <span class="gap seg c" id="cost">$0.0000</span>
      <span class="pipe">|</span>
      <span class="bar" id="bar">░░░░░░░░░░</span><span class="pct" id="pct">0%</span>
    </div>
    <div class="sl sl2">
      <span class="warn">▶▶ bypass permissions on (shift+tab to cycle)</span>
      <span class="remote" id="remote">Remote Control active</span>
    </div>
  </div>
</div>
<script>
const feed=document.getElementById('feed');
let cleared=false, cost=0, total=0;

function ln(cls,html){ const d=document.createElement('div'); d.className='ln '+cls; d.innerHTML=html; return d; }
function esc(s){ return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function ts(t){ const d=new Date((t||Date.now()/1000)*1000), p=n=>String(n).padStart(2,'0');
  return `<span class="dim">[${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}]</span> `; }
function pctOf(a,n){ return n?Math.round(a/n*100):0; }
function setBar(f){ f=Math.max(0,Math.min(1,f)); const k=Math.round(f*10);
  document.getElementById('bar').textContent='█'.repeat(k)+'░'.repeat(10-k);
  document.getElementById('pct').textContent=Math.round(f*100)+'%'; }
function dropCur(){ const c=document.getElementById('cur'); if(c) c.remove(); }
function addCur(){ dropCur(); const c=ln('prompt',`<span class="p">❯</span> <span class="cur">&nbsp;</span>`); c.id='cur'; feed.appendChild(c); }

function render(e){
  if(!cleared){ feed.innerHTML=''; cleared=true; }
  dropCur();
  if(e.kind==='start'){
    total=e.n_props||0;
    document.getElementById('prog').textContent='命题 0/'+total;
    feed.appendChild(ln('star',`* labless consensus-lab · 受试 [${(e.subjects||[]).join(', ')}] · 无人值守 session`));
  } else if(e.kind==='say'){
    feed.appendChild(ln('','<span class="b">●</span> <span class="atext">'+esc(e.text)+'</span>'));
  } else if(e.kind==='proposition'){
    document.getElementById('prog').textContent='命题 '+e.idx+'/'+e.total;
    feed.appendChild(ln('prop','\n<span class="b">●</span> 命题 '+e.idx+'/'+e.total+' · <b>'+esc(e.title)+'</b>'));
    feed.appendChild(ln('','  <span class="dim"># '+esc(e.blurb)+'</span>'));
  } else if(e.kind==='running'){
    feed.appendChild(ln('',ts(e.t)+'<span class="b">●</span> <span class="tool">Run</span>(<span class="code">lab eval "'+esc(e.title)+'" --model='+esc(e.model).toLowerCase()+'</span>)'));
  } else if(e.kind==='result'){
    cost+=e.cost||0; document.getElementById('cost').textContent='$'+cost.toFixed(4);
    const p=pctOf(e.ok,e.n);
    feed.appendChild(ln('','  <span class="br">⎿</span>  '+esc(e.model)+'  '+e.ok+'/'+e.n+'  <span class="dim">'+p+'%  $'+(e.cost||0).toFixed(4)+'</span>'));
  } else if(e.kind==='consensus'){
    const sc=(e.scores||[]).map(s=>s[0]+' '+s[1]+'/'+s[2]).join('  ·  ');
    feed.appendChild(ln('','<span class="b">●</span> <span class="atext">共识：'+esc(e.text)+'</span>'));
    feed.appendChild(ln('','  <span class="br">⎿</span> <span class="dim">'+sc+'</span>'));
    if(total) setBar(e.idx/total);
  } else if(e.kind==='done'){
    if(e.total_cost!=null) document.getElementById('cost').textContent='$'+Number(e.total_cost).toFixed(4);
    setBar(1);
    feed.appendChild(ln('star','\n* session complete · '+(e.total_cost!=null?'$'+Number(e.total_cost).toFixed(4):'')+' · 共识已落墙'));
  } else if(e.kind==='halt'){
    feed.appendChild(ln('star',ts(e.t)+'⏹ 已停 — '+esc(e.reason)));
  }
  addCur();
  window.scrollTo(0,document.body.scrollHeight);
}

// 公开页:无后台直播流,改为「按真实节奏回放最近一场 session,循环」
function resetView(){
  feed.innerHTML=''; cleared=false; cost=0; total=0;
  document.getElementById('cost').textContent='$0.0000';
  document.getElementById('prog').textContent='命题 0/0'; setBar(0);
}
const sleep=ms=>new Promise(r=>setTimeout(r,ms));

async function run(){
  let events=[];
  try{
    const r=await fetch('./stream.jsonl?_='+Date.now(),{cache:'no-store'});
    events=(await r.text()).split('\n').filter(Boolean)
      .map(l=>{ try{ return JSON.parse(l); }catch(_){ return null; } }).filter(Boolean);
  }catch(_){ return; }
  if(!events.length) return;
  while(true){
    resetView();
    for(let i=0;i<events.length;i++){
      render(events[i]);
      const nxt=events[i+1];
      let d=600;
      if(nxt){ const gap=(nxt.t-events[i].t)*1000; d=Math.max(280,Math.min(1900,gap)); }
      await sleep(d);
    }
    await sleep(4500);   // 一场放完,停一下再循环
  }
}
run();
</script>
</body>
</html>
